services:
  app:
    image: ghcr.io/danielmaycock/moonstone-reference:latest
    restart: unless-stopped
    environment:
      - API_BASE_URL=https://moonstoneapi.dans-apps.co.uk
    networks:
      - traefik-public
    labels:
      - traefik.enable=true
      - traefik.http.routers.moonstone.rule=Host(`moonstone.dans-apps.co.uk`)
      - traefik.http.routers.moonstone.entrypoints=websecure
      - traefik.http.routers.moonstone.tls.certresolver=letsencrypt
      - traefik.http.services.moonstone.loadbalancer.server.port=3000

networks:
  traefik-public:
    external: true
